<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hire Ramona Agent</title>
</head>
<body>
    <h1>Hire Ramona Agent</h1>
    <div>
        <input id="input" placeholder="Ask me anything..." />
        <button onclick="send()">Send</button>
        <div id="output"></div>
      </div>
      
      <script>
      async function send() {
        const userText = document.getElementById("input").value;
        const r = await fetch("https://agent-be-hire-ramona-dsouza.vercel.app/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText })
        });
        const data = await r.json();
        document.getElementById("output").innerText = data.reply;
      }
      </script>
      
</body>
</html>
